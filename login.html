<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Portfolio</title>
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="bi bi-shield-lock-fill"></i></div>
      <div class="login-title">Admin Panel</div>
      <div class="login-subtitle">Ingresa tus credenciales para continuar</div>
    </div>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="username">Usuario</label>
        <input id="username" class="form-input" type="text" placeholder="admin" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-wrap">
          <input id="password" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="toggle-pass" id="toggle-pass" title="Mostrar contraseña">
            <i class="bi bi-eye" id="eye-icon"></i>
          </button>
        </div>
      </div>

      <div class="login-error" id="login-error">
        <i class="bi bi-exclamation-triangle me-1"></i> Usuario o contraseña incorrectos
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
      </button>
    </form>

    <a href="index.html" class="login-back">
      <i class="bi bi-arrow-left"></i> Volver al portafolio
    </a>
  </div>
</div>

<script src="app.js"></script>
<script>
  // Redirect if already logged in
  if (PortfolioData.isLoggedIn()) {
    window.location.href = 'admin.html';
  }

  const form     = document.getElementById('login-form');
  const errorEl  = document.getElementById('login-error');
  const toggleBtn = document.getElementById('toggle-pass');
  const eyeIcon  = document.getElementById('eye-icon');
  const passInput = document.getElementById('password');

  toggleBtn.addEventListener('click', () => {
    const isPass = passInput.type === 'password';
    passInput.type = isPass ? 'text' : 'password';
    eyeIcon.className = isPass ? 'bi bi-eye-slash' : 'bi bi-eye';
  });

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');

    btn.textContent = 'Verificando en BD...';
    btn.disabled = true;

    const res = await PortfolioData.login(u, p);
    if (res.success) {
      btn.innerHTML = '<i class="bi bi-check-circle"></i> Acceso Concedido';
      btn.style.background = 'var(--success)';
      setTimeout(() => window.location.href = 'admin.html', 500);
    } else {
      errorEl.textContent = res.error || 'Usuario o contraseña incorrectos';
      errorEl.classList.add('show');
      btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión';
      btn.disabled = false;
      passInput.value = '';
      passInput.focus();
    }
  });
</script>
</body>
</html>
